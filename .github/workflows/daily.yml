name: ETF Holdings Tracker

on:
  schedule:
    - cron: '5 13 * * 1-5'  # 9:05 PM Taiwan time (UTC+8), weekdays only
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t etf-tracker .

      - name: Run crawler and diff
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/data:/app/data \
            -e TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
            -e TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }} \
            etf-tracker all

      - name: Commit new CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: ETF holdings $(date +%Y-%m-%d)"
          git push
